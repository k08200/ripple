<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌊 Ripple — Live Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      #app { display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; }
      header {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; background: #181818; color: #eee;
        border-bottom: 1px solid #333;
      }
      header h1 { font-size: 15px; font-weight: 600; }
      header .sub { font-size: 12px; color: #888; }
      .spacer { flex: 1; }
      #status {
        font-size: 12px; padding: 4px 10px; border-radius: 999px;
        background: #2a2a2a; color: #aaa; display: flex; align-items: center; gap: 6px;
      }
      #status .dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
      #status.connected .dot { background: #22c55e; }
      #editor { flex: 1; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🌊 Ripple</h1>
        <span class="sub">라이브 협업 편집 데모 · 이 페이지를 두 탭으로 열고 타이핑해보세요</span>
        <div class="spacer"></div>
        <div id="status"><span class="dot"></span><span id="status-text">연결 중…</span></div>
      </header>
      <div id="editor"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
