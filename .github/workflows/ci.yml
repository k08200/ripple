name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - name: Build (backend + extension)
        run: npm run build
      - name: Unit + integration tests
        run: node --no-warnings --test backend/test/*.mjs extension/test/*.mjs
      - name: Engine eval (synthetic, no key)
        run: node scripts/eval.mjs
