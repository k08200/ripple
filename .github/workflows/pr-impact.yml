name: PR Impact

# PR 게이트 — PR 이 열리거나 갱신되면 저장 기준과 같은 graph 엔진을 PR diff 에 돌려
# "이 변경이 뭘·어떻게·어디를 깨는지" 를 PR 코멘트로 단다(영향 없으면 ✅).
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff 에 base..head 전체 필요
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run build -w backend
      - name: Analyze PR impact
        run: node scripts/pr-impact.mjs > impact.md
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_NAME: ${{ github.event.repository.name }}
      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('impact.md', 'utf8').trim();
            if (!body) return;
            const tag = '<!-- ripple-impact -->';
            const full = `${tag}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: full });
            }
